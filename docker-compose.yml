version: '3.9'
services:
  backend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run backend"
    volumes:
      - ./:/app
    ports:
      - "3001:3001"
    env_file:
      - .env

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend
